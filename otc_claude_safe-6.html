<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="تحليل OTC">
<title>تحليل Pocket Option</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal','Arial',sans-serif;background:#0a0e1a;color:#e8eaf6;min-height:100vh;padding:16px;direction:rtl;}
.btn{transition:all 0.18s;cursor:pointer;border:none;font-family:'Tajawal','Arial',sans-serif;}
.btn:active{transform:scale(0.93);}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes gb{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,0.3);}50%{box-shadow:0 0 0 14px rgba(0,230,118,0);}}
@keyframes rs{0%,100%{box-shadow:0 0 0 0 rgba(255,23,68,0.3);}50%{box-shadow:0 0 0 14px rgba(255,23,68,0);}}
</style>
</head>
<body>

<!-- Header -->
<div style="text-align:center;padding:18px 0 14px;">
  <div style="font-size:1.65rem;font-weight:800;background:linear-gradient(135deg,#2979ff,#00e676);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
    📊 تحليل Pocket Option
  </div>
  <div style="font-size:0.95rem;font-weight:700;color:#7eb8ff;margin-top:5px;">by Ahmad & Hsen</div>
  <div style="color:#546e7a;font-size:0.8rem;margin-top:4px;">OTC • تحليل الشارت الحقيقي • 6 مؤشرات</div>
</div>

<!-- API Key Input -->
<div id="apiKeySection" style="display:none;background:#111827;border:1px solid #ff1744;border-radius:16px;padding:18px;margin-bottom:12px;">
  <div style="font-size:0.7rem;color:#ff6b6b;letter-spacing:2px;margin-bottom:12px;font-weight:700;">🔑 أدخل Claude API Key</div>
  <input id="apiKeyInput" type="password" placeholder="sk-ant-api03-..."
    style="width:100%;background:#1a2535;border:1px solid #1e2d45;color:#e8eaf6;padding:13px 15px;border-radius:11px;font-size:0.85rem;outline:none;margin-bottom:10px;direction:ltr;">
  <button class="btn" onclick="saveApiKey()"
    style="width:100%;background:linear-gradient(135deg,#1565c0,#2979ff);color:white;padding:12px;border-radius:11px;font-size:0.95rem;font-weight:700;">
    ✅ حفظ الـ Key
  </button>
</div>

<!-- Pair Selection -->
<div style="background:#111827;border:1px solid #1e2d45;border-radius:16px;padding:18px;margin-bottom:12px;">
  <div style="font-size:0.7rem;color:#546e7a;letter-spacing:2px;margin-bottom:12px;font-weight:700;">① اختر زوج OTC</div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;" id="pairsGrid"></div>
</div>

<!-- Upload -->
<div style="background:#111827;border:1px solid #1e2d45;border-radius:16px;padding:18px;margin-bottom:12px;">
  <div style="font-size:0.7rem;color:#546e7a;letter-spacing:2px;margin-bottom:12px;font-weight:700;">② ارفع صورة الشارت</div>
  <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleImage(this)">
  <div id="uploadArea">
    <button class="btn" onclick="document.getElementById('fileInput').click()"
      style="width:100%;background:linear-gradient(135deg,#1a2535,#1a3a5c);border:2px dashed #2979ff;border-radius:12px;padding:28px 16px;color:#7eb8ff;font-size:0.95rem;text-align:center;">
      <div style="font-size:2.5rem;margin-bottom:8px;">📁</div>
      <div style="font-weight:700;font-size:1rem;">Upload Chart</div>
      <div style="font-size:0.78rem;margin-top:6px;color:#546e7a;">اضغط لرفع screenshot الشارت</div>
    </button>
  </div>
  <div id="previewArea" style="display:none;">
    <img id="previewImg" style="width:100%;border-radius:12px;max-height:220px;object-fit:cover;margin-bottom:10px;">
    <button class="btn" onclick="resetImage()"
      style="width:100%;background:#1a2535;border:1px solid #1e2d45;color:#7eb8ff;padding:10px;border-radius:10px;font-size:0.85rem;font-weight:700;">
      📁 تغيير الصورة
    </button>
  </div>
</div>

<!-- Analyze Button -->
<button class="btn" id="analyzeBtn" onclick="analyze()" disabled
  style="width:100%;background:#1a2535;color:white;padding:16px;border-radius:14px;font-size:1.05rem;font-weight:800;margin-bottom:16px;opacity:0.5;cursor:not-allowed;">
  🔍 تحليل الشارت الآن
</button>

<!-- Loading -->
<div id="loading" style="display:none;text-align:center;padding:20px 0 28px;">
  <div style="width:40px;height:40px;border:3px solid #1e2d45;border-top-color:#2979ff;border-radius:50%;margin:0 auto 12px;animation:spin 0.7s linear infinite;"></div>
  <p style="color:#546e7a;font-size:0.85rem;">يتم تحليل الشارت بالذكاء الاصطناعي...</p>
  <p style="color:#1e2d45;font-size:0.75rem;margin-top:5px;">RSI • MACD • Bollinger • Stochastic • MA • ATR</p>
</div>

<!-- Error -->
<div id="errorBox" style="display:none;background:#1a0000;border:1px solid #ff1744;border-radius:12px;padding:16px;color:#ff6b6b;text-align:center;font-size:0.9rem;margin-bottom:12px;"></div>

<!-- Result -->
<div id="result" style="display:none;animation:up 0.4s ease;"></div>

<script>
// API Key stored in localStorage for security
let API_KEY = localStorage.getItem('claude_api_key') || '';
// Check if API key exists
window.onload = function() {
  API_KEY = localStorage.getItem('claude_api_key') || '';
  if (!API_KEY) {
    document.getElementById('apiKeySection').style.display = 'block';
  }
};

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-ant-')) {
    alert('الـ Key غير صحيح! يجب أن يبدأ بـ sk-ant-');
    return;
  }
  localStorage.setItem('claude_api_key', key);
  API_KEY = key;
  document.getElementById('apiKeySection').style.display = 'none';
  alert('تم حفظ الـ Key بنجاح! ✅');
}

const PAIRS = [
  "AED/CNY OTC","AUD/CAD OTC","AUD/USD OTC","CAD/JPY OTC",
  "CHF/JPY OTC","CHF/NOK OTC","EUR/HUF OTC","EUR/USD OTC",
  "EUR/GBP OTC","GBP/USD OTC","MAD/USD OTC","NZD/USD OTC",
  "QAR/CNY OTC","SAR/CNY OTC","USD/CAD OTC","USD/CHF OTC",
  "USD/JPY OTC"
];

let selectedPair = "EUR/USD OTC";
let imageBase64 = null;
let imageMime = "image/jpeg";
let countdown = null;
let timerInterval = null;

// Build pairs
document.getElementById('pairsGrid').innerHTML = PAIRS.map(p => `
  <button class="btn" id="pair_${p.replace(/[^a-z]/gi,'')}" onclick="selectPair('${p}')"
    style="background:${p===selectedPair?'#1a3a5c':'#1a2535'};border:1px solid ${p===selectedPair?'#2979ff':'#1e2d45'};color:${p===selectedPair?'#7eb8ff':'#e8eaf6'};padding:11px 8px;border-radius:11px;font-size:0.78rem;font-weight:700;">
    ${p}
  </button>`).join('');

function selectPair(p) {
  selectedPair = p;
  document.getElementById('pairsGrid').innerHTML = PAIRS.map(pair => `
    <button class="btn" onclick="selectPair('${pair}')"
      style="background:${pair===p?'#1a3a5c':'#1a2535'};border:1px solid ${pair===p?'#2979ff':'#1e2d45'};color:${pair===p?'#7eb8ff':'#e8eaf6'};padding:11px 8px;border-radius:11px;font-size:0.78rem;font-weight:700;">
      ${pair}
    </button>`).join('');
}

function handleImage(input) {
  const file = input.files[0];
  if (!file) return;
  imageMime = "image/jpeg";
  const reader = new FileReader();
  reader.onload = (e) => {
    // Resize image to reduce size
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxSize = 800;
      let w = img.width, h = img.height;
      if (w > maxSize) { h = h * maxSize / w; w = maxSize; }
      if (h > maxSize) { w = w * maxSize / h; h = maxSize; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const resized = canvas.toDataURL('image/jpeg', 0.8);
      imageBase64 = resized.split(',')[1];
      document.getElementById('previewImg').src = resized;
      document.getElementById('uploadArea').style.display = 'none';
      document.getElementById('previewArea').style.display = 'block';
      const btn = document.getElementById('analyzeBtn');
      btn.disabled = false;
      btn.style.background = 'linear-gradient(135deg,#1565c0,#2979ff)';
      btn.style.opacity = '1';
      btn.style.cursor = 'pointer';
      document.getElementById('result').style.display = 'none';
      document.getElementById('errorBox').style.display = 'none';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function resetImage() {
  imageBase64 = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('uploadArea').style.display = 'block';
  document.getElementById('previewArea').style.display = 'none';
  document.getElementById('analyzeBtn').style.background = '#1a2535';
  document.getElementById('analyzeBtn').style.opacity = '0.5';
  document.getElementById('result').style.display = 'none';
}

function startCountdown() {
  if (timerInterval) clearInterval(timerInterval);
  let secs = 60;
  const btn = document.getElementById('countdownBtn');
  btn.disabled = true;
  timerInterval = setInterval(() => {
    secs--;
    const color = secs > 30 ? '#00e676' : secs > 10 ? '#ffd600' : '#ff1744';
    btn.style.color = color;
    btn.style.borderColor = color;
    btn.textContent = `⏱ ${secs}`;
    btn.style.fontSize = '1.8rem';
    if (secs <= 0) {
      clearInterval(timerInterval);
      btn.disabled = false;
      btn.textContent = '▶️ ابدأ الصفقة — عداد 60 ثانية';
      btn.style.fontSize = '1rem';
      btn.style.color = 'white';
      btn.style.borderColor = 'transparent';
    }
  }, 1000);
}

async function analyze() {
  API_KEY = localStorage.getItem('claude_api_key') || '';
  if (!API_KEY) {
    document.getElementById('apiKeySection').style.display = 'block';
    alert('من فضلك أدخل الـ API Key أولاً!');
    return;
  }
  if (!imageBase64) { 
    document.getElementById('errorBox').textContent = '❌ من فضلك ارفع صورة الشارت أولاً!';
    document.getElementById('errorBox').style.display = 'block';
    return; 
  }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '⏳ جاري التحليل...';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';

  const now = new Date();
  const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const day = now.toLocaleDateString('en-US', {weekday:'long'});

  const prompt = `You are a professional binary options trader with expert chart reading skills. Analyze this Pocket Option OTC chart image for a 1-minute trade on ${selectedPair}.

CRITICAL ANALYSIS RULES - Follow these EXACTLY:

1. SENTIMENT BAR (look for colored bar at bottom showing % of buyers vs sellers):
   - If you see 80%+ GREEN (buyers dominant): Market is OVERCROWDED with buyers = price WILL DROP = OUTPUT بيع
   - If you see 80%+ RED (sellers dominant): Market is OVERCROWDED with sellers = price WILL RISE = OUTPUT شراء
   - If 60-79% GREEN: Mild buying pressure, check other signals
   - If 60-79% RED: Mild selling pressure, check other signals
   - If 40-59% either side: Balanced, follow trend and indicators

2. MACD INDICATOR (histogram bars + two lines at bottom of chart):
   - Green histogram bars getting TALLER + green line above red line = STRONG BUY شراء
   - Green histogram bars APPEARING after red = REVERSAL = شراء
   - Red histogram bars getting TALLER + red line above green line = STRONG SELL بيع
   - Red histogram bars SHRINKING/turning green = REVERSAL = شراء
   - THIS IS THE MOST IMPORTANT INDICATOR FOR REVERSALS

3. RSI (line oscillator, usually second panel from bottom):
   - Line near 30 or below = oversold = شراء
   - Line near 70 or above = overbought = بيع
   - Line rising from bottom = شراء
   - Line falling from top = بيع

4. MOVING AVERAGES (colored curved lines on main chart):
   - Price candles ABOVE all MA lines = uptrend = شراء
   - Price candles BELOW all MA lines = downtrend = بيع
   - Price crossing FROM BELOW to ABOVE MA = شراء signal
   - Price crossing FROM ABOVE to BELOW MA = بيع signal
   - MAs starting to curve upward = شراء
   - MAs starting to curve downward = بيع

5. LAST 5 CANDLES (rightmost candles):
   - 3+ consecutive GREEN candles = bullish momentum = شراء
   - 3+ consecutive RED candles = bearish momentum = بيع
   - Long wick pointing DOWN after downtrend = hammer = شراء
   - Long wick pointing UP after uptrend = shooting star = بيع
   - Small candles after big move = exhaustion, expect reversal

6. FINAL SCORING:
   Count buy signals vs sell signals from above 5 steps.
   If 3+ signals say شراء → output شراء
   If 3+ signals say بيع → output بيع
   If tied → use MACD as tiebreaker
   
   NEVER output the same signal just because previous analysis did.
   ALWAYS base your answer on what you ACTUALLY see in THIS image.

Respond with ONLY this JSON (no other text):
{"signal":"شراء or بيع","confidence":"55-92","signal_strength":"قوي or معتدل or ضعيف","trend":"صاعد or هابط","pattern":"describe the key pattern you see in Arabic","best_entry":"الآن or انتظر X ثواني","support":"nearest support level","resistance":"nearest resistance level","sentiment":"X% green X% red as you see it","indicators":{"rsi":{"value":"number you see","signal":"شراء or بيع","note":"one sentence Arabic"},"macd":{"value":"positive or negative","signal":"شراء or بيع","note":"one sentence Arabic - describe what you see"},"bollinger":{"position":"قرب الحد العلوي or قرب الحد السفلي or في المنتصف","signal":"شراء or بيع","note":"one sentence Arabic"},"stochastic":{"k":"estimate","d":"estimate","signal":"شراء or بيع","note":"one sentence Arabic"},"ma":{"ma20":"estimate","ma50":"estimate","signal":"شراء or بيع","note":"one sentence Arabic - are candles above or below MAs"},"atr":{"value":"estimate","note":"منخفض or متوسط or مرتفع"}},"reason":"2 sentences Arabic: first describe EXACTLY what you see (MACD color, RSI level, sentiment %, candle direction), second explain your signal choice"}`

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const data = await res.json();
    console.log('API Response:', JSON.stringify(data).substring(0,200));
    
    let text = '';
    if (data.content && data.content[0]) {
      text = data.content[0].text;
    } else if (data.error) {
      throw new Error(data.error.message || 'API Error');
    } else {
      throw new Error('Invalid response: ' + JSON.stringify(data).substring(0,100));
    }
    
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('no json in: ' + text.substring(0,100));
    const r = JSON.parse(match[0]);
    showResult(r);
  } catch(e) {
    console.error('Error:', e);
    document.getElementById('errorBox').textContent = '❌ تعذر التحليل: ' + e.message;
    document.getElementById('errorBox').style.display = 'block';
  }

  document.getElementById('loading').style.display = 'none';
  btn.disabled = false;
  btn.textContent = '🔍 تحليل الشارت الآن';
}

function indRow(name, icon, d) {
  if (!d) return '';
  const buy = d.signal === 'شراء';
  const c = buy ? '#00e676' : '#ff1744';
  const bg = buy ? '#0a2a0a' : '#2a0a0a';
  return `<div style="background:${bg};border:1px solid ${c}44;border-radius:12px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">
    <div style="flex:1;">
      <div style="font-size:0.73rem;color:#546e7a;margin-bottom:3px;">${icon} ${name}</div>
      <div style="font-size:0.82rem;color:#b0bec5;">${d.note||''}</div>
    </div>
    <div style="background:${c}22;color:${c};font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:20px;margin-right:10px;white-space:nowrap;">${d.signal}</div>
  </div>`;
}

function showResult(r) {
  const buy = r.signal === 'شراء';
  const sc = buy ? '#00e676' : '#ff1744';
  const sb = buy ? 'linear-gradient(135deg,#001a00,#003300)' : 'linear-gradient(135deg,#1a0000,#330000)';
  const anim = buy ? 'gb' : 'rs';
  const conf = parseInt(r.confidence) || 65;
  const confColor = conf >= 70 ? '#00e676' : conf >= 55 ? '#ffd600' : '#ff1744';
  const changeColor = r.trend === 'صاعد' ? '#00e676' : '#ff1744';

  const html = `
    <div style="background:${sb};border:2px solid ${sc};border-radius:20px;padding:26px 20px;text-align:center;margin-bottom:14px;animation:${anim} 2.5s infinite;">
      <div style="font-size:0.75rem;opacity:0.6;letter-spacing:2px;margin-bottom:6px;">التوصية • دقيقة • ${selectedPair}</div>
      <div style="font-size:3rem;font-weight:800;color:${sc};line-height:1.1;">${buy?'🟢':'🔴'} ${r.signal}</div>
      <div style="font-size:0.85rem;opacity:0.75;margin-top:8px;">${r.signal_strength} الإشارة</div>
      <div style="margin-top:14px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <span style="font-size:0.78rem;color:#546e7a;">نسبة الثقة</span>
          <span style="font-size:0.88rem;font-weight:700;color:${confColor};">${conf}%</span>
        </div>
        <div style="height:7px;background:#1a2535;border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${conf}%;background:${confColor};border-radius:4px;"></div>
        </div>
      </div>
    </div>

    <button class="btn" id="countdownBtn" onclick="startCountdown()"
      style="width:100%;background:linear-gradient(135deg,${buy?'#003300,#005500':'#330000,#550000'});color:white;padding:16px;border-radius:14px;font-size:1rem;font-weight:800;margin-bottom:14px;border:2px solid transparent;">
      ▶️ ابدأ الصفقة — عداد 60 ثانية
    </button>

    <div style="background:#111827;border:1px solid #1e2d45;border-radius:16px;padding:18px;margin-bottom:14px;">
      <div style="font-size:0.7rem;color:#546e7a;letter-spacing:2px;margin-bottom:12px;font-weight:700;">Price Action</div>
      ${[['النمط','#ffd600',r.pattern],['الاتجاه',changeColor,r.trend],['Sentiment','#7eb8ff',r.sentiment],['أفضل دخول','#ffd600',r.best_entry],['الدعم','#00e676',r.support],['المقاومة','#ff1744',r.resistance]]
        .filter(([,, v])=>v)
        .map(([l,c,v])=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a2535;">
          <span style="color:#546e7a;font-size:0.83rem;">${l}</span>
          <span style="font-weight:700;color:${c};font-size:0.85rem;">${v}</span>
        </div>`).join('')}
    </div>

    <div style="background:#111827;border:1px solid #1e2d45;border-radius:16px;padding:18px;margin-bottom:14px;">
      <div style="font-size:0.7rem;color:#546e7a;letter-spacing:2px;margin-bottom:14px;font-weight:700;">المؤشرات التقنية الستة</div>
      ${indRow('RSI','📈',r.indicators?.rsi)}
      ${indRow('MACD','📉',r.indicators?.macd)}
      ${indRow('Bollinger Bands','🎯',r.indicators?.bollinger)}
      ${indRow('Stochastic','🔄',r.indicators?.stochastic)}
      ${indRow('Moving Average','📊',r.indicators?.ma)}
      ${r.indicators?.atr?`<div style="background:#111a2a;border:1px solid #1e2d45;border-radius:12px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;">
        <div><div style="font-size:0.73rem;color:#546e7a;margin-bottom:3px;">⚡ ATR — قوة التقلب</div>
        <div style="font-size:0.82rem;color:#b0bec5;">${r.indicators.atr.note}</div></div>
        <div style="color:#ffd600;font-weight:700;">${r.indicators.atr.value}</div>
      </div>`:''}
    </div>

    <div style="background:#111827;border:1px solid #1e2d45;border-radius:16px;padding:18px;margin-bottom:14px;">
      <div style="font-size:0.7rem;color:#546e7a;letter-spacing:2px;margin-bottom:10px;font-weight:700;">ملخص التحليل</div>
      <p style="color:#b0bec5;font-size:0.88rem;line-height:1.8;">${r.reason}</p>
    </div>

    <button class="btn" onclick="resetImage();document.getElementById('result').style.display='none';"
      style="width:100%;background:#1a2535;border:1px solid #1e2d45;color:#7eb8ff;padding:14px;border-radius:14px;font-size:0.95rem;font-weight:700;margin-bottom:8px;">
      📁 تحليل شارت جديد
    </button>

    <div style="background:#0f1420;border:1px solid #1a2030;border-radius:12px;padding:14px;font-size:0.76rem;color:#3a4f63;text-align:center;line-height:1.7;margin-bottom:32px;">
      ⚠️ هذا التحليل للمعلومات فقط. القرار النهائي يعود لك دائماً.
    </div>`;

  const el = document.getElementById('result');
  el.innerHTML = html;
  el.style.display = 'block';
}
</script>
</body>
</html>
